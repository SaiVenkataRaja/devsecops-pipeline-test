name: My DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-secure:
    runs-on: ubuntu-latest
    
    steps:
      - name: Download Code from Repository
        uses: actions/checkout@v4

      - name: Run Trivy FS Scan (Check for Secrets)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          exit-code: '1'

      - name: Build Docker Image
        run: docker build -t svr77/my-simple-web:1.0 .

      - name: Run Trivy Image Scan (Check Base OS)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'svr77/my-simple-web:1.0'
          scan-type: 'image'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
      - name: Build Docker Image
        run: docker build -t my-simple-web:1.0 .

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Secure Image to Registry
        run: docker push svr77/my-simple-web:1.0