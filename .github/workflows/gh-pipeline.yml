name: My DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-secure:
    runs-on: ubuntu-latest
    
    steps:
      - name: Download Code from Repository
        uses: actions/checkout@v4

      - name: Run Trivy FS Scan (Check for Secrets)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          exit-code: '1'

      - name: Build Docker Image
        run: docker build -t svr77/my-simple-web:1.0 .

      - name: Run Trivy Image Scan (Check Base OS)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'svr77/my-simple-web:1.0'
          scan-type: 'image'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
      - name: Build Docker Image
        run: docker build -t my-simple-web:1.0 .

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Secure Image to Registry
        run: docker push svr77/my-simple-web:1.0

      - name: Deploy to Azure Ubuntu VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_KEY }}
          script: |
            # 1. Install Docker if it isn't already installed on the VM
            if ! command -v docker &> /dev/null; then
              sudo apt-get update && sudo apt-get install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker $USER
            fi
            
            # 2. Stop and remove the old running container if it exists
            sudo docker stop my-running-web || true
            sudo docker rm my-running-web || true
            
            # 3. Pull the fresh, verified image from Docker Hub
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/my-simple-web:1.0
            
            # 4. Run the new container live on port 80
            sudo docker run -d --name my-running-web -p 8080:80 ${{ secrets.DOCKER_USERNAME }}/my-simple-web:1.0